name: Flash Sale Platform CI

on:
  push:
    branches: [main]
    paths:
      - 'flash-sale-platform/**'
  pull_request:
    branches: [main]
    paths:
      - 'flash-sale-platform/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flash-sale-platform

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (lint + compile + test)
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: flash-sale-platform/**/build/reports/tests/
          retention-days: 7
