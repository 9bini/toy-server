name: Flash Sale Platform CI

on:
  push:
    paths:
      - 'flash-sale-platform/**'
  pull_request:
    branches: [main]
    paths:
      - 'flash-sale-platform/**'

# 같은 PR에서 새 push가 오면 이전 실행을 취소 (리소스 절약)
concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flash-sale-platform

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (lint + compile + test)
        run: ./gradlew build 2>&1 | tee build-output.txt; exit ${PIPESTATUS[0]}

      - name: Show build error
        if: failure()
        run: |
          grep -B1 -A5 'FAILED\|Newline\|Expected\|style violations' build-output.txt | head -40 | while IFS= read -r line; do
            echo "::error::$line"
          done

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: flash-sale-platform/**/build/reports/tests/
          retention-days: 7
