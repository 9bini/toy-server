name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        type: choice
        options:
          - staging
          - production
      service:
        description: '배포 서비스 (all = 전체)'
        required: true
        type: choice
        options:
          - all
          - gateway
          - queue-service
          - order-service
          - payment-service
          - notification-service
      version:
        description: '배포 버전 (예: 1.0.0, latest)'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/flash-sale

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    strategy:
      matrix:
        service: ${{ inputs.service == 'all' && fromJson('["gateway","queue-service","order-service","payment-service","notification-service"]') || fromJson(format('["{0}"]', inputs.service)) }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists
        run: |
          docker manifest inspect ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ inputs.version }}

      - name: Deploy ${{ matrix.service }} to ${{ inputs.environment }}
        run: |
          echo "=== Deploying ${{ matrix.service }}:${{ inputs.version }} to ${{ inputs.environment }} ==="
          echo ""
          echo "Image: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ inputs.version }}"
          echo "Environment: ${{ inputs.environment }}"
          echo ""
          echo "TODO: 실제 배포 스크립트 추가"
          echo "  - kubectl set image ... (Kubernetes)"
          echo "  - docker compose pull && docker compose up -d (Docker Compose)"
          echo "  - aws ecs update-service ... (ECS)"
