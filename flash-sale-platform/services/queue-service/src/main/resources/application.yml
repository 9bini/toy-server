server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: queue-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 8

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
