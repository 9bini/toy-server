# Flash Sale Platform - Nginx L7 리버스 프록시
# 역할: Rate Limiting (1차 방어선), 로드밸런싱, SSE 프록시
#
# 운영 환경에서는 서비스별 replica 수를 늘리고
# upstream 블록에 서버를 추가하여 수평 확장

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    # 10만 동시 접속 대응: worker당 최대 연결 수
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    # --- 기본 설정 ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 로그 포맷 (요청 처리 시간 포함)
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # --- Rate Limiting (1차 방어선: 봇/매크로 차단) ---
    # IP당 초당 요청 수 제한 (burst로 순간 트래픽 허용)
    limit_req_zone $binary_remote_addr zone=api_rate:10m rate=50r/s;
    # 주문 API는 더 엄격하게 제한 (선착순 공정성)
    limit_req_zone $binary_remote_addr zone=order_rate:10m rate=5r/s;

    # --- Connection Limiting (SSE 연결 수 관리) ---
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # --- Upstream 정의 (수평 확장 시 서버 추가) ---
    upstream gateway {
        # 운영 환경: 여러 인스턴스 추가
        # server gateway-1:8080;
        # server gateway-2:8080;
        server host.docker.internal:8080;
        keepalive 32;
    }

    upstream queue_service {
        # SSE 연결이 많으므로 least_conn 전략 사용
        least_conn;
        server host.docker.internal:8081;
        keepalive 64;
    }

    upstream order_service {
        server host.docker.internal:8082;
        keepalive 32;
    }

    upstream payment_service {
        server host.docker.internal:8083;
        keepalive 16;
    }

    # --- 서버 블록 ---
    server {
        listen 80;
        server_name _;

        # 요청 본문 크기 제한
        client_max_body_size 1m;

        # --- Gateway API (일반 요청) ---
        location /api/ {
            limit_req zone=api_rate burst=100 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # WebFlux 비동기 응답 대기
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # --- 대기열 SSE (장시간 연결 유지) ---
        location /api/queue/ {
            limit_conn conn_limit 5;

            proxy_pass http://queue_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            # SSE 연결: 5분 유지 (대기열 최대 대기 시간)
            proxy_read_timeout 300s;
            proxy_connect_timeout 5s;
            # SSE 버퍼링 비활성화 (실시간 이벤트 전달)
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # --- 주문 API (엄격한 Rate Limiting) ---
        location /api/orders {
            limit_req zone=order_rate burst=10 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://order_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            proxy_read_timeout 10s;
            proxy_connect_timeout 5s;
        }

        # --- 결제 API ---
        location /api/payments {
            limit_req zone=api_rate burst=50 nodelay;

            proxy_pass http://payment_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            # 결제는 외부 API 호출이 있으므로 타임아웃 여유
            proxy_read_timeout 15s;
            proxy_connect_timeout 5s;
        }

        # --- Actuator 헬스체크 (내부용) ---
        location /actuator/ {
            # Rate Limiting 없음 (모니터링 시스템 전용)
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # --- 503 에러 페이지 (대기열 만석 등) ---
        error_page 503 /503.html;
        location = /503.html {
            default_type text/html;
            return 503 '<html><body><h1>현재 접속자가 많습니다</h1><p>잠시 후 다시 시도해주세요.</p></body></html>';
        }
    }
}
