version: '3.8'

services:
  # ===========================================
  # Redis - 캐시, 분산 락, 대기열, Rate Limiting
  # ===========================================
  redis:
    image: redis:7.4-alpine
    container_name: flashsale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Kafka (KRaft 모드) - 이벤트 스트리밍
  # ===========================================
  kafka:
    image: apache/kafka:3.8.1
    container_name: flashsale-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ===========================================
  # PostgreSQL - 주문/결제 영속 데이터
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: flashsale-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flashsale
      POSTGRES_USER: flashsale
      POSTGRES_PASSWORD: flashsale123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashsale"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Prometheus - 메트릭 수집
  # ===========================================
  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: flashsale-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - redis
      - kafka

  # ===========================================
  # Grafana - 모니터링 대시보드
  # ===========================================
  grafana:
    image: grafana/grafana:11.4.0
    container_name: flashsale-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  redis-data:
  kafka-data:
  postgres-data:
  prometheus-data:
  grafana-data:
